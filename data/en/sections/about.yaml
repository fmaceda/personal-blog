summary: 'Software Engineer with 7+ years of experience building scalable web applications, cloud-based solutions, and AI-powered products that turn smart ideas into real-world impact. Strong background in full stack development using C#, .NET, and React, with hands-on experience in microservices environments and cloud platforms such as Azure and AWS. I thrive at the intersection of traditional engineering and modern AI — integrating large language models and intelligent automation into production systems. Proven track record of improving system reliability, optimizing performance, and driving development best practices including CI/CD, code reviews, and automated workflows. Experienced in supporting production systems, mentoring developers, and contributing to technical decisions that enhance team productivity and software quality.'

